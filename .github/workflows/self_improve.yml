name: Self-Improve — AI with Abdullah

on:
  schedule:
    # 11:00 PM PKT = 6:00 PM UTC
    - cron: '0 18 * * *'

  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests groq

      - name: Run self-improvement analysis
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          GH_PAT:        ${{ secrets.GH_PAT }}
          GITHUB_REPO:   abdullahkevlog1-spec/viral-content-machine
        run: python self_improve_action.py
