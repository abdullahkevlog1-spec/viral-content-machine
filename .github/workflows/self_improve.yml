name: Self-Improve — AI with Abdullah

on:
  schedule:
    # 8:00 AM PKT  = 3:00 UTC  — subah report
    - cron: '0 3 * * *'
    # 8:00 PM PKT  = 15:00 UTC — raat report
    - cron: '0 15 * * *'

  workflow_dispatch:  # Manual trigger — abhi chalao

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run self-improvement analysis
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          GH_PAT:        ${{ secrets.GH_PAT }}
          GITHUB_REPO:   abdullahkevlog1-spec/viral-content-machine
        run: python self_improve_action.py
