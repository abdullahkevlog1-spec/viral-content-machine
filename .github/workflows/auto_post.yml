name: Auto Post — AI with Abdullah

on:
  schedule:
    - cron: '0 4 * * *'   # 09:00 PKT  → morning slot
    - cron: '0 6 * * *'   # 11:00 PKT  → trending slot
    - cron: '0 9 * * *'   # 14:00 PKT  → afternoon slot
    - cron: '0 16 * * *'  # 21:00 PKT  → evening slot
  workflow_dispatch:
    inputs:
      slot:
        description: 'Which slot to post'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - trending
          - afternoon
          - evening

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── STEP: Validate critical secrets before doing anything ──
      # Fails fast with a readable message instead of a cryptic Python traceback.
      - name: Validate required secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          echo "Validating required secrets..."
          MISSING=0

          if [ -z "$GROQ_API_KEY" ]; then
            echo "❌ GROQ_API_KEY is not set in GitHub Secrets"
            MISSING=1
          else
            echo "✓ GROQ_API_KEY present (${#GROQ_API_KEY} chars)"
          fi

          if [ -z "$FB_PAGE_TOKEN" ]; then
            echo "❌ FB_PAGE_TOKEN is not set in GitHub Secrets"
            MISSING=1
          else
            echo "✓ FB_PAGE_TOKEN present"
          fi

          if [ -z "$FB_PAGE_ID" ]; then
            echo "❌ FB_PAGE_ID is not set in GitHub Secrets"
            MISSING=1
          else
            echo "✓ FB_PAGE_ID present (${FB_PAGE_ID})"
          fi

          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "Fix: Go to GitHub → Settings → Secrets and variables → Actions"
            echo "Add the missing secrets listed above, then re-run this workflow."
            exit 1
          fi

          echo ""
          echo "✅ All required secrets validated — proceeding to post"

      - name: Determine slot from cron time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SLOT=${{ inputs.slot }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "04" ]; then
              echo "SLOT=morning" >> $GITHUB_ENV
            elif [ "$HOUR" = "06" ]; then
              echo "SLOT=trending" >> $GITHUB_ENV
            elif [ "$HOUR" = "09" ]; then
              echo "SLOT=afternoon" >> $GITHUB_ENV
            else
              echo "SLOT=evening" >> $GITHUB_ENV
            fi
          fi

      - name: Run auto post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: abdullahkevlog1-spec/viral-content-machine
        run: python auto_post.py --slot $SLOT

      # ── Non-critical monitor steps: use || true so they never kill the run ──
      - name: Update actions status
        run: python update_actions_status.py || true

      - name: Update FB analytics
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python update_fb_analytics.py || true

      - name: Update strategy state
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python update_strategy_state.py || true

      - name: Commit monitor updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add -A
          git diff --staged --quiet || git commit -m "chore: update monitor data [skip ci]"
          git push || true
