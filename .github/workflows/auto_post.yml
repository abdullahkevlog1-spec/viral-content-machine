name: Auto Post — AI with Abdullah

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Which slot to post'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - trending
          - afternoon
          - evening

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine slot from cron time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SLOT=${{ inputs.slot }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "04" ]; then
              echo "SLOT=morning" >> $GITHUB_ENV
            elif [ "$HOUR" = "06" ]; then
              echo "SLOT=trending" >> $GITHUB_ENV
            elif [ "$HOUR" = "09" ]; then
              echo "SLOT=afternoon" >> $GITHUB_ENV
            else
              echo "SLOT=evening" >> $GITHUB_ENV
            fi
          fi

      - name: Run auto post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: abdullahkevlog1-spec/viral-content-machine
        run: python auto_post.py --slot $SLOT

      - name: Update actions status
        run: python update_actions_status.py

      - name: Update FB analytics
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python update_fb_analytics.py

      - name: Update strategy state
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python update_strategy_state.py

      - name: Commit monitor updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add -A
          git diff --staged --quiet || git commit -m "chore: update monitor data [skip ci]"
          git push || true
