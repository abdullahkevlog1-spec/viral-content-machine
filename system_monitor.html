<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Control Center</title><style>body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}.card{background:#1e293b;padding:20px;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.25)}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #334155;text-align:left}</style><meta http-equiv="refresh" content="45"></head><body><h1>AI Autonomous System Monitor</h1><div class="grid"><div class="card"><h3>Posts</h3><div id="posts">Loading...</div></div><div class="card"><h3>Learning</h3><div id="learning">Loading...</div></div><div class="card"><h3>Trends</h3><div id="trends">Loading...</div></div><div class="card"><h3>Schedule</h3><div id="schedule">Loading...</div></div><div class="card"><h3>GitHub Actions</h3><div id="actions">Loading...</div></div><div class="card"><h3>FB Analytics</h3><div id="analytics">Loading...</div></div><div class="card"><h3>Strategy Weights</h3><div id="weights">Loading...</div></div><div class="card"><h3>Agent Heartbeat</h3><div id="heartbeat">Loading...</div></div><div class="card"><h3>Errors / Logs</h3><div id="logs">Loading...</div></div></div><div class="card" style="margin-top:20px"><h3>Recent Posts</h3><div id="recent_posts">Loading...</div></div><script>async function loadJson(path){try{const res=await fetch(path);return await res.json()}catch(e){return null}}async function init(){const posts=await loadJson('data/post_log.json');const strategy=await loadJson('data/optimized_prompt_profile.json');const trends=await loadJson('data/trends_cache.json');const schedule=await loadJson('data/schedule.json');const actions=await loadJson('data/actions_status.json');const analytics=await loadJson('data/fb_analytics.json');const weights=await loadJson('data/strategy_state.json');if(posts&&posts.length>0){const latest=posts[posts.length-1];document.getElementById('posts').innerHTML=`Total Posts: ${posts.length}<br>Latest: ${latest.timestamp||'N/A'}`;let table='<table><tr><th>Time</th><th>Status</th><th>Type</th></tr>';posts.slice(-10).reverse().forEach(p=>{table+=`<tr><td>${p.timestamp||'N/A'}</td><td>${p.status||'N/A'}</td><td>${p.type||'N/A'}</td></tr>`});table+='</table>';document.getElementById('recent_posts').innerHTML=table;}else{document.getElementById('posts').innerHTML='No data';document.getElementById('recent_posts').innerHTML='No posts';}document.getElementById('learning').innerHTML=strategy?`Best Hook: ${(strategy.best_hooks||[])[0]||'N/A'}<br>Best CTA: ${(strategy.best_ctas||[])[0]||'N/A'}<br>Avg Score: ${strategy.avg_score||0}`:'No data';const top=trends&&trends.trends?(trends.trends[0]||{}):{};document.getElementById('trends').innerHTML=trends?`Top Trend: ${top.topic||'N/A'}<br>Score: ${top.score||'N/A'}`:'No data';document.getElementById('schedule').innerHTML=schedule?`Next Post: ${schedule.next_post||'Not scheduled'}`:'No data';document.getElementById('actions').innerHTML=actions?`Status: ${actions.status||'N/A'}<br>Last Run: ${actions.last_run||'N/A'}`:'No data';document.getElementById('analytics').innerHTML=analytics?`Likes: ${analytics.likes||0}<br>Comments: ${analytics.comments||0}<br>Shares: ${analytics.shares||0}<br>Score: ${analytics.score||0}`:'No data';document.getElementById('weights').innerHTML=weights?`Hook: ${weights.best_hook||'N/A'}<br>Niche: ${weights.best_niche||'N/A'}<br>Style: ${weights.best_style||'N/A'}`:'No data';document.getElementById('heartbeat').innerHTML=`Last Refresh: ${new Date().toLocaleString()}`;document.getElementById('logs').innerHTML='No critical errors';}init();</script></body></html>
